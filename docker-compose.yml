services:
  server:
    build: ./server
    container_name: chennai-server
    ports:
      - "8100:8100"
    restart: unless-stopped

  node:
    build:
      context: ./node
      args:
        API_BASE: http://server:8100
    container_name: chennai-node
    ports:
      - "3010:3000"
    depends_on:
      - server
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: chennai-nginx
    ports:
      - "8090:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - node
      - server
    restart: unless-stopped
